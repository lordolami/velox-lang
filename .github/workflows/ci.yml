name: Velox CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: AI reliability benchmark
        run: npm run bench:ai

      - name: LSP quality gate
        run: npm run lsp:gate

      - name: Runtime speed regression gate
        run: npm run bench:fast:gate

      - name: App-level benchmark regression gate
        run: npm run bench:apps:gate

      - name: Deterministic output gate
        run: npm run check:deterministic

      - name: Quickstart flow gate
        run: npm run verify:quickstart
